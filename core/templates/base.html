{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GYM | Build Your Body</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent-green: #48c9b0; --text-gray: #b3b3b3; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #000; color: #fff; overflow-x: hidden; }
        
        header { position: absolute; top: 0; width: 100%; z-index: 100; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 8%; position: relative; }
        .logo { font-size: 1.4rem; letter-spacing: 2px; font-weight: 400; display: flex; align-items: center; }
        .logo::before { content: "⬡"; color: var(--accent-green); margin-right: 10px; font-size: 1.8rem; }
        .logo strong { font-weight: 900; }

        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { margin-left: 25px; }
        nav ul li a { 
            text-decoration: none; color: #fff; font-size: 0.75rem; 
            font-weight: 700; letter-spacing: 1px; transition: 0.3s; 
        }
        nav ul li a:hover, nav ul li a.active { color: var(--accent-green); }

        .nav-toggle {
            display: none;
        }
        .nav-toggle-label {
            display: none;
        }

        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 35%, rgba(0,0,0,0.1)), 
                        url("{% static 'images/Female Fitness Photoshoot Ideas Gym.jpg' %}");
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 10%; position: relative;
        }

        @media (max-width: 980px) {
            nav { padding: 18px 6%; }
            .logo { font-size: 1.2rem; }
            nav ul li { margin-left: 18px; }
            .hero { padding: 0 6% !important; }
            .hero-content h1, .hero-content h2 { font-size: 3rem !important; }
            .hero-content p { font-size: 0.85rem !important; }
            .btn-outline { padding: 14px 26px !important; }
        }

        @media (max-width: 768px) {
            nav { padding: 16px 5%; }
            nav ul { 
                position: fixed; top: 0; right: 0; height: 100vh; width: 260px;
                flex-direction: column; align-items: flex-start;
                background: rgba(0,0,0,0.95); padding-top: 100px;
                transform: translateX(100%); transition: transform 0.3s ease;
            }
            nav ul li { margin: 18px 0; margin-left: 0; width: 100%; text-align: center; }
            nav ul li a { width: 100%; display: inline-block; padding: 12px 0; }

            .nav-toggle { 
                display: block; position: absolute; top: 22px; right: 5%;
                width: 34px; height: 24px; opacity: 0; z-index: 150;
            }
            .nav-toggle-label {
                display: block; position: absolute; top: 22px; right: 5%;
                width: 34px; height: 24px; z-index: 149; cursor: pointer;
            }
            .nav-toggle-label span {
                display: block; width: 100%; height: 3px; background: #fff;
                margin: 5px 0; transition: transform 0.3s ease, opacity 0.3s ease;
            }
            .nav-toggle:checked + .nav-toggle-label + ul {
                transform: translateX(0);
            }
            .nav-toggle:checked + .nav-toggle-label span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }
            .nav-toggle:checked + .nav-toggle-label span:nth-child(2) {
                opacity: 0;
            }
            .nav-toggle:checked + .nav-toggle-label span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }

            section, main { padding-left: 6% !important; padding-right: 6% !important; }

            .hero-content h1, .hero-content h2 { font-size: 2.4rem !important; }
            .hero-content p { font-size: 0.8rem !important; }
            .badge { display: none !important; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 1.1rem; }
            .hero-content h1, .hero-content h2 { font-size: 2rem !important; }
            nav { padding: 14px 4%; }
        }

        .bg-watermark {
            position: absolute; font-size: 20vw; font-weight: 900;
            color: rgba(255, 255, 255, 0.04); z-index: 1;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            white-space: nowrap; pointer-events: none; letter-spacing: -5px;
        }

        .page-watermark {
            position: fixed; inset: 0; display: flex;
            align-items: center; justify-content: center;
            font-size: 22vw; font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none; z-index: -1;
            white-space: nowrap; letter-spacing: -5px;
        }

        .hero-content { position: relative; z-index: 2; max-width: 650px; }
        .hero-content h1, .hero-content h2 { font-size: 4.5rem; font-weight: 900; line-height: 1.1; }
        .hero-content h2 span { color: var(--accent-green); }
        .hero-content p { color: var(--text-gray); font-size: 0.8rem; margin: 30px 0; text-transform: uppercase; }

        .btn-outline {
            display: inline-block; padding: 18px 40px; border: 1px solid #fff;
            color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 700; transition: 0.4s;
        }
        .btn-outline:hover { background: #fff; color: #000; }

        .badge {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(255, 255, 255, 0.05); padding: 15px 25px;
            border-left: 4px solid var(--accent-green);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">THE<strong>GYM</strong></div>

            <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" />
            <label for="nav-toggle" class="nav-toggle-label" aria-label="Open navigation">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <ul>
                <li><a href="{% url 'home' %}">HOMEPAGE</a></li>
                <li><a href="{% url 'about' %}">ABOUT</a></li>
                <li><a href="{% url 'classes' %}">CLASSES</a></li>
                <li><a href="{% url 'pricing' %}">PRICING</a></li>
                <li><a href="{% url 'news' %}">NEWS</a></li>
                <li><a href="{% url 'contact' %}">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    {% block content %}{% endblock %}
</body>
</html>
